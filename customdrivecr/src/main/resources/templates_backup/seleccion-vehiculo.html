<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Selección de Vehículo | CustomDrive CR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-900">

    <div class="max-w-5xl mx-auto px-6 py-10">

        <div class="bg-white rounded-xl shadow p-8">

            <div class="mb-8">
                <h1 class="text-3xl font-bold">Seleccioná tu vehículo</h1>
                <p class="text-gray-600 mt-2">
                    Elegí el vehículo para ver únicamente los accesorios compatibles.
                </p>
            </div>

            <form th:action="@{/catalogo}" method="get" class="space-y-6">

                <div>
                    <label class="block text-sm font-semibold mb-2">Vehículo</label>

                    <select name="vehiculoId" required class="w-full border rounded-lg px-4 py-3">
                        <option value="">Seleccione un vehículo</option>

                        <option th:each="vehiculo : ${vehiculos}"
                                th:value="${vehiculo.id}"
                                th:text="${vehiculo.modelo.marca.nombre + ' - ' + vehiculo.modelo.nombre + ' - ' + vehiculo.anio + ' - ' + vehiculo.version}">
                            BMW - i8 Coupé - 2024 - Coupé
                        </option>
                    </select>
                </div>

                <button type="submit"
                        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg">
                    Ver accesorios compatibles
                </button>
            </form>

            <div class="mt-8 flex gap-4">
                <a href="/" class="text-blue-700 hover:underline">Volver al inicio</a>
                <a href="/login" class="text-blue-700 hover:underline">Iniciar sesión</a>
            </div>

        </div>
    </div>

</body>
</html>
