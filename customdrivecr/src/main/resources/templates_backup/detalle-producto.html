<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto | CustomDrive CR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-900">

    <div class="max-w-6xl mx-auto px-6 py-10">

        <div class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Detalle del Producto</h1>
                <p class="text-gray-600 mt-2">Información completa del accesorio seleccionado.</p>
            </div>

            <a href="javascript:history.back()" class="bg-gray-800 text-white px-4 py-2 rounded">
                Volver
            </a>
        </div>

        <div th:if="${mensaje}" class="bg-yellow-100 border border-yellow-300 text-yellow-800 px-4 py-3 rounded">
            <span th:text="${mensaje}">Mensaje</span>
        </div>

        <div th:if="${accesorio != null}" class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Imagen -->
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="h-[420px] bg-gray-200 flex items-center justify-center">
                    <img th:if="${accesorio.imagenUrl != null && !accesorio.imagenUrl.isEmpty()}"
                        th:src="${accesorio.imagenUrl}" class="w-full h-full object-cover" alt="Imagen del accesorio">

                    <span th:if="${accesorio.imagenUrl == null || accesorio.imagenUrl.isEmpty()}"
                        class="text-gray-500 text-xl">
                        Sin imagen disponible
                    </span>
                </div>
            </div>

            <!-- Información -->
            <div class="bg-white rounded-xl shadow p-8">

                <p class="text-sm text-blue-700 font-semibold uppercase tracking-wide" th:text="${accesorio.categoria}">
                    Categoría
                </p>

                <h2 class="text-4xl font-bold mt-3" th:text="${accesorio.nombre}">
                    Nombre del accesorio
                </h2>

                <p class="text-gray-600 mt-5 text-lg leading-relaxed" th:text="${accesorio.descripcion}">
                    Descripción del accesorio.
                </p>

                <div class="mt-8 border-t pt-6">
                    <p class="text-sm text-gray-500">Precio</p>
                    <p class="text-4xl font-bold text-gray-900">
                        ₡<span th:text="${accesorio.precio}">10900</span>
                    </p>
                </div>

                <div class="mt-6">
                    <p class="text-sm text-gray-500">Stock disponible</p>
                    <p class="text-xl font-semibold">
                        <span th:text="${accesorio.stock}">8</span> unidades
                    </p>
                </div>

                <div class="mt-6">
                    <p class="text-sm text-gray-500">Estado</p>

                    <span th:if="${accesorio.activo}"
                        class="inline-block mt-1 px-3 py-1 text-sm rounded bg-green-100 text-green-700">
                        Producto activo
                    </span>

                    <span th:if="${!accesorio.activo}"
                        class="inline-block mt-1 px-3 py-1 text-sm rounded bg-red-100 text-red-700">
                        Producto inactivo
                    </span>
                </div>

                <div class="mt-8 flex gap-4">
                    <a th:href="@{/carrito/agregar/{id}(id=${accesorio.id})}"
                        class="flex-1 text-center bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded">
                        Agregar al carrito
                    </a>

                    <a href="/seleccion-vehiculo"
                        class="flex-1 text-center bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded">
                        Cambiar vehículo
                    </a>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
