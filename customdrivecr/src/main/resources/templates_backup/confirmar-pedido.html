<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Pedido | CustomDrive CR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-900">

    <div class="max-w-6xl mx-auto px-6 py-10">

        <div class="mb-8">
            <h1 class="text-3xl font-bold">Confirmar compra</h1>
            <p class="text-gray-600 mt-2">
                Verifique sus datos antes de generar el comprobante interno.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <div class="bg-white rounded-xl shadow p-6 lg:col-span-1">

                <h2 class="text-xl font-bold mb-4">Datos del cliente</h2>

                <form th:action="@{/pedidos/confirmar}" method="post" class="space-y-4">

                    <div>
                        <label class="block text-sm font-semibold mb-1">Nombre</label>
                        <input type="text" name="nombreCliente" required
                               th:value="${nombreCliente}"
                               class="w-full border rounded px-3 py-2">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Correo</label>
                        <input type="email" name="correoCliente" required
                               th:value="${correoCliente}"
                               class="w-full border rounded px-3 py-2">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Teléfono</label>
                        <input type="text" name="telefonoCliente" required
                               class="w-full border rounded px-3 py-2"
                               placeholder="Ej: 8888-8888">
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded">
                        Generar comprobante
                    </button>

                    <a href="/carrito"
                       class="block text-center text-gray-600 hover:text-blue-700">
                        Volver al carrito
                    </a>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow p-6 lg:col-span-2">

                <h2 class="text-xl font-bold mb-4">Resumen del pedido</h2>

                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-200 text-left">
                            <th class="p-3">Producto</th>
                            <th class="p-3">Cantidad</th>
                            <th class="p-3">Precio</th>
                            <th class="p-3">Subtotal</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="item : ${carrito}" class="border-b">
                            <td class="p-3" th:text="${item.accesorio.nombre}">Producto</td>
                            <td class="p-3" th:text="${item.cantidad}">1</td>
                            <td class="p-3">₡<span th:text="${item.accesorio.precio}">0</span></td>
                            <td class="p-3 font-bold">₡<span th:text="${item.subtotal}">0</span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-right mt-6 text-2xl font-bold">
                    Total: ₡<span th:text="${total}">0</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
